        html, body {
            height: 100%;

            flex-direction: column;
        }

        .main-content {
            flex: 1; /* This makes the content take up all available space, pushing the footer to the bottom */

        }

        .themecolor {

        }
    </style>

    <script type="text/javascript">
        var currentCaptcha = '';

        function generateCaptchaText() {
            // excludes visually ambiguous characters (0/O, 1/I/l)
            var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789';
            var result = '';
            for (var i = 0; i < 6; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        function drawCaptcha(text) {
            var canvas = document.getElementById('capimage');
            var ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#000080';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 22px Arial, sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
        }

        function refreshCaptcha() {
            currentCaptcha = generateCaptchaText();
            drawCaptcha(currentCaptcha);
            document.getElementById('Captcha1').value = '';
            document.querySelector('[data-valmsg-for="Captcha1"]').textContent = '';
        }

        document.addEventListener('DOMContentLoaded', function () {
            refreshCaptcha();

            document.getElementById('captcha-refresh-btn').addEventListener('click', refreshCaptcha);

            document.querySelector('form').addEventListener('submit', function (e) {
                e.preventDefault();
                var entered = document.getElementById('Captcha1').value;
                var errorSpan = document.querySelector('[data-valmsg-for="Captcha1"]');

                if (entered === currentCaptcha) {
                    window.location.href = 'JEEMAINM.html';
                } else {
                    errorSpan.textContent = 'Incorrect CAPTCHA, please try again.';
                    refreshCaptcha();
                }
            });
        });
    </script>
    <style>
        /* Sticky footer only for desktop screens */
        @media (min-width: 792px) {
            .footer {
                position: fixed;
                bottom: 0;
                width: 100%;
            }
        }
    </style>
</head>

<form action="/ResultoService26/P1S2JM26/ViewQrCode" method="post">        <div class="container-fluid">

                                <path d="M6 10V8a6 6 0 1 1 12 0v2h1a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-9a1 1 0 0 1 1-1h1zm2 0h8V8a4 4 0 1 0-8 0v2z"/>
                            </svg>
                            View Result
                        </legend>
                        <div class="row mb-3 mt-3">
                            <div class="col-lg-4 col-sm-4  text-end">
                                <label class="control-label" for="Captcha1">Enter CAPTCHA </label><span class="text-success fw-bold">(case sensitive) </span> :
                            </div>
                            <div class="col-lg-8 col-sm-8">
                                <input autocomplete="off" class="form-control text-box single-line" data-val="true" data-val-required="*Required" id="Captcha1" maxlength="6" minlength="6" name="Captcha1" style="" type="text" value="">
